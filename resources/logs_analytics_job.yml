resources:
  jobs:
    logs_analytics_job:
      name: logs_analytics
      tags:
        project_name: "logs-analytics"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: logs_analytics
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/logs_data_analytics.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
