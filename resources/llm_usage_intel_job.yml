resources:
  jobs:
    llm_usage_intelligence:
      name: llm_usage_intelligence
      tags:
        project_name: "llm-usage-intelligence"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: llm_usage_intelligence
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/hw1_data_collection.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
