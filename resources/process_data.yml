resources:
  jobs:
    data-pipeline:
      name: llm-usage-intel-data-pipeline
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Europe/Amsterdam"
        pause_status: ${var.schedule_pause_status}
      tags:
        project_name: "llm_usage_intelligence"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: preprocessing
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/hw2_query_clustering_with_chunking.py
            base_parameters:
              env: ${bundle.target}
